<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="naver-site-verification" content="065ca67de7d3753f1b02bdd17a7036c69ac372f7" />
    <title>대구의 문화 맥박</title>
    <style>
      @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

      :root {
        color-scheme: light;
        --bg: #f5f7ed;
        --ink: #17231f;
        --muted: rgba(23, 35, 31, 0.66);
        --soft: rgba(255, 255, 255, 0.72);
        --line: rgba(23, 35, 31, 0.14);
        --red: #e95f55;
        --blue: #66b8d4;
        --yellow: #ecc65e;
        --green: #70bd8a;
        --violet: #a98bd8;
        --black: #10130f;
        --paper: #fffdf4;
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        min-width: 320px;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(255, 253, 244, 0.58), var(--bg) 680px),
          radial-gradient(circle at 18% 10%, rgba(236, 198, 94, 0.2), transparent 25rem),
          radial-gradient(circle at 84% 18%, rgba(102, 184, 212, 0.22), transparent 28rem),
          linear-gradient(135deg, #fffdf4 0%, #ecf4e7 54%, #d9eef0 100%),
          var(--bg);
        color: var(--ink);
        font-family: "Pretendard", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        min-height: 100svh;
        padding: clamp(18px, 3.5vw, 42px);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: clamp(26px, 5vw, 64px);
      }

      .top-status {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .brand {
        display: grid;
        gap: 6px;
      }

      .brand strong {
        font-size: clamp(1.24rem, 2.8vw, 2rem);
        letter-spacing: 0;
      }

      .brand span,
      .status,
      .clock {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.5;
        word-break: keep-all;
      }

      .status,
      .clock {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 40px;
        padding: 0 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.64);
        backdrop-filter: blur(16px);
        white-space: nowrap;
      }

      .status i,
      .clock i {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 22px var(--green);
      }

      .clock {
        color: rgba(23, 35, 31, 0.78);
        font-weight: 780;
      }

      .clock i {
        background: var(--blue);
        box-shadow: 0 0 22px var(--blue);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
        gap: clamp(22px, 4vw, 58px);
        align-items: stretch;
      }

      .pulse-stage {
        position: relative;
        min-height: clamp(540px, 72svh, 820px);
        overflow: hidden;
        border: 1px solid rgba(102, 184, 212, 0.28);
        border-radius: 8px;
        background:
          radial-gradient(circle at 58% 54%, rgba(102, 184, 212, 0.26), transparent 22rem),
          radial-gradient(circle at 35% 62%, rgba(112, 189, 138, 0.18), transparent 20rem),
          linear-gradient(135deg, rgba(13, 32, 32, 0.96), rgba(23, 43, 39, 0.9) 45%, rgba(240, 253, 246, 0.36));
        box-shadow: 0 30px 90px rgba(16, 38, 34, 0.22), inset 0 0 80px rgba(102, 184, 212, 0.12);
      }

      #pulse-canvas {
        position: absolute;
        inset: 0;
        z-index: 3;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .lite-motion #pulse-canvas {
        display: none;
      }

      .stage-copy {
        position: absolute;
        left: clamp(18px, 3vw, 34px);
        right: clamp(18px, 3vw, 34px);
        top: clamp(16px, 2.6vw, 28px);
        z-index: 4;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 20px;
        pointer-events: none;
      }

      h1 {
        max-width: 11em;
        margin: 0;
        color: rgba(248, 255, 250, 0.94);
        font-size: clamp(2.2rem, 5.4vw, 5.2rem);
        line-height: 0.96;
        letter-spacing: 0;
        text-shadow: 0 0 24px rgba(102, 184, 212, 0.18);
      }

      .art-note {
        position: absolute;
        left: clamp(18px, 3vw, 34px);
        right: clamp(18px, 3vw, 34px);
        bottom: clamp(18px, 3vw, 34px);
        z-index: 4;
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        color: rgba(248, 255, 250, 0.68);
        font-size: clamp(0.86rem, 1.3vw, 1rem);
        line-height: 1.65;
        word-break: keep-all;
        pointer-events: none;
      }

      .legend {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
        max-width: 380px;
      }

      .legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 26px;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(248, 255, 250, 0.78);
        backdrop-filter: blur(14px);
      }

      .legend i {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--c);
      }

      .live-count {
        display: grid;
        justify-items: end;
        gap: 4px;
        min-width: 104px;
      }

      .live-count b {
        font-size: clamp(2.8rem, 7vw, 6.2rem);
        line-height: 0.86;
      }

      .live-count span {
        color: rgba(248, 255, 250, 0.64);
        font-size: 0.9rem;
      }

      .pulse-stage .live-count b {
        color: rgba(248, 255, 250, 0.96);
      }

      .districts {
        display: none;
      }

      .map-art {
        position: absolute;
        inset: 15% -7% 4%;
        z-index: 3;
        pointer-events: auto;
      }

      .map-art svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .map-shape {
        fill: rgba(112, 189, 138, 0.24);
        stroke: rgba(23, 35, 31, 0.16);
        stroke-width: 1.6;
      }

      .map-shape.gunwi {
        fill: rgba(233, 95, 120, 0.24);
      }

      .map-core {
        fill: rgba(255, 255, 255, 0.38);
        stroke: rgba(23, 35, 31, 0.18);
        stroke-width: 1;
      }

      .map-grid {
        fill: none;
        stroke: rgba(23, 35, 31, 0.08);
        stroke-width: 1;
      }

      .map-district {
        fill: color-mix(in srgb, var(--area-color, #ffffff) 36%, white 64%);
        stroke: rgba(23, 35, 31, 0.24);
        stroke-width: 1.5;
        cursor: pointer;
        pointer-events: auto;
        transition: fill 220ms ease, filter 220ms ease, opacity 220ms ease, stroke 220ms ease;
      }

      .map-district.gunwi {
        fill: color-mix(in srgb, var(--area-color, #e95f78) 38%, white 62%);
      }

      .map-district.is-dim {
        opacity: 0.58;
      }

      .map-district.is-active {
        fill: color-mix(in srgb, var(--area-color, #70bd8a) 64%, white 36%);
        stroke: rgba(23, 35, 31, 0.46);
        stroke-width: 1.5;
        filter: none;
      }

      .map-district.is-selected {
        fill: color-mix(in srgb, var(--area-color, #70bd8a) 74%, white 26%);
        stroke: rgba(23, 35, 31, 0.62);
        stroke-width: 1.5;
        filter: none;
      }

      .map-district[data-area="군위군"] {
        --area-color: #ef89a7;
      }

      .map-district[data-area="북구"] {
        --area-color: #8cc36f;
      }

      .map-district[data-area="동구"] {
        --area-color: #83cbd6;
      }

      .map-district[data-area="서구"] {
        --area-color: #f2ba63;
      }

      .map-district[data-area="중구"] {
        --area-color: #f08b75;
      }

      .map-district[data-area="남구"] {
        --area-color: #c6a5e7;
      }

      .map-district[data-area="수성구"] {
        --area-color: #7cb6e8;
      }

      .map-district[data-area="달서구"] {
        --area-color: #f0d66a;
      }

      .map-district[data-area="달성군"] {
        --area-color: #9fd18d;
      }

      .map-label {
        fill: rgba(23, 35, 31, 0.34);
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0;
        pointer-events: none;
      }

      .pulse-line {
        fill: none;
        stroke: rgba(233, 95, 85, 0.24);
        stroke-width: 1.6;
        stroke-linecap: round;
        stroke-dasharray: 1 13;
        opacity: 0.68;
        animation: dash 2.4s linear infinite;
        pointer-events: none;
      }

      .pulse-line.fine {
        stroke: rgba(102, 184, 212, 0.22);
        stroke-width: 0.85;
        stroke-dasharray: 1 8;
        opacity: 0.58;
      }

      .data-flow {
        fill: none;
        stroke: var(--flow-color, #70bd8a);
        stroke-linecap: round;
        stroke-width: var(--flow-width, 2);
        stroke-dasharray: 0.5 10;
        opacity: 0.72;
        animation: flowDash 1.08s linear infinite;
        pointer-events: none;
      }

      .data-flow.echo {
        stroke-width: calc(var(--flow-width, 2) * 2.8);
        stroke-dasharray: 22 34;
        opacity: 0.1;
        animation-duration: 2.6s;
      }

      .lite-motion .pulse-line,
      .lite-motion .data-flow,
      .lite-motion .svg-node .node-pulse {
        animation: none;
      }

      .lite-motion .data-flow.echo {
        display: none;
      }

      @keyframes dash {
        to {
          stroke-dashoffset: -44;
        }
      }

      @keyframes flowDash {
        to {
          stroke-dashoffset: -52;
        }
      }

      .district {
        position: absolute;
        display: grid;
        place-items: center;
        width: clamp(52px, 5.8vw, 72px);
        aspect-ratio: 1;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: rgba(23, 35, 31, 0.74);
        font-size: clamp(0.58rem, 0.74vw, 0.7rem);
        font-weight: 820;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transition: transform 240ms ease, background 240ms ease, color 240ms ease;
      }

      .district span {
        position: relative;
        z-index: 2;
        display: grid;
        place-items: center;
        gap: 1px;
        width: clamp(44px, 4.8vw, 58px);
        aspect-ratio: 1;
        padding: 4px;
        border: 2px solid color-mix(in srgb, var(--tone, #70bd8a) 42%, white 58%);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 10px 24px rgba(39, 72, 62, 0.16);
        text-align: center;
      }

      .district small {
        color: rgba(23, 35, 31, 0.52);
        font-size: 0.54rem;
        font-weight: 760;
      }

      .district::after,
      .district::before {
        position: absolute;
        inset: 7%;
        border: 2px solid color-mix(in srgb, var(--tone, var(--blue)) 72%, transparent);
        border-radius: inherit;
        content: "";
        opacity: calc(0.2 + var(--heat, 0.2) * 0.62);
        animation: throb var(--tempo, 2.6s) ease-out infinite;
        box-shadow: 0 0 24px color-mix(in srgb, var(--tone, var(--blue)) 32%, transparent);
      }

      .district[data-count="0"]::before {
        opacity: 0.2;
        animation-duration: 3.8s;
      }

      .district::after {
        inset: 39%;
        border: 0;
        background: var(--tone, var(--blue));
        opacity: 0.9;
        animation: beat var(--tempo, 2.6s) ease-in-out infinite;
      }

      .district[data-count="0"]::after {
        opacity: 0.36;
      }

      .svg-node .node-pulse {
        fill: none;
        stroke: var(--tone, #70bd8a);
        stroke-width: 3;
        opacity: 0.4;
        transform-box: fill-box;
        transform-origin: center;
        animation: svgPulse 2.4s ease-out infinite;
        pointer-events: none;
      }

      .svg-node .node-core {
        fill: rgba(255, 255, 255, 0.9);
        stroke: color-mix(in srgb, var(--tone, #70bd8a) 42%, white 58%);
        stroke-width: 2.5;
        cursor: pointer;
        pointer-events: auto;
        filter: none;
      }

      .svg-node.is-active .node-core {
        fill: color-mix(in srgb, var(--tone, #70bd8a) 18%, white 82%);
        stroke: var(--tone, #70bd8a);
        stroke-width: 2.5;
        filter: none;
      }

      .svg-node.is-selected .node-core {
        fill: #fffdf4;
        stroke-width: 2.5;
        filter: none;
      }

      .svg-node text {
        fill: rgba(23, 35, 31, 0.82);
        font-weight: 900;
        letter-spacing: 0;
        text-anchor: middle;
        pointer-events: none;
      }

      .svg-node .node-name {
        font-size: 15px;
      }

      .svg-node .node-count {
        fill: rgba(23, 35, 31, 0.58);
        font-size: 11px;
        font-weight: 760;
      }

      @keyframes svgPulse {
        0% {
          transform: scale(0.82);
          opacity: 0.42;
        }

        72%,
        100% {
          transform: scale(1.52);
          opacity: 0;
        }
      }

      @keyframes throb {
        0% {
          transform: scale(0.72);
          opacity: 0.62;
        }

        72%,
        100% {
          transform: scale(1.52);
          opacity: 0;
        }
      }

      @keyframes beat {
        0%,
        100% {
          transform: scale(0.9);
        }

        18% {
          transform: scale(1.24);
        }

        32% {
          transform: scale(0.96);
        }
      }

      .filters-panel {
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .toolbar,
      .results,
      .detail {
        border: 1px solid rgba(102, 184, 212, 0.28);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(13, 32, 32, 0.9), rgba(23, 43, 39, 0.78)),
          rgba(8, 26, 28, 0.72);
        color: rgba(248, 255, 250, 0.9);
        backdrop-filter: blur(20px);
        box-shadow: 0 18px 58px rgba(7, 19, 20, 0.16), inset 0 0 28px rgba(102, 184, 212, 0.08);
      }

      .toolbar {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .map-insight {
        position: absolute;
        left: clamp(18px, 3vw, 34px);
        right: clamp(18px, 3vw, 34px);
        top: clamp(138px, 18vw, 205px);
        z-index: 4;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        pointer-events: none;
      }

      .map-insight span {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid rgba(102, 184, 212, 0.28);
        border-radius: 999px;
        background: rgba(8, 28, 28, 0.42);
        color: rgba(248, 255, 250, 0.8);
        font-size: 0.82rem;
        font-weight: 760;
        backdrop-filter: blur(14px);
      }

      .data-orbit {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
      }

      .orbit-node {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: clamp(132px, 15vw, 190px);
        min-height: 68px;
        padding: 10px 11px 10px 13px;
        border: 1px solid color-mix(in srgb, var(--node-color, #66b8d4) 68%, transparent);
        border-left-width: 3px;
        border-radius: 8px;
        background:
          linear-gradient(90deg, color-mix(in srgb, var(--node-color, #66b8d4) 18%, transparent), rgba(11, 32, 34, 0.62)),
          rgba(7, 22, 24, 0.68);
        color: rgba(248, 255, 250, 0.94);
        cursor: pointer;
        pointer-events: auto;
        text-align: left;
        transform: translate(-50%, -50%);
        box-shadow: 0 16px 38px rgba(4, 16, 18, 0.22), inset 0 0 22px rgba(102, 184, 212, 0.08);
        backdrop-filter: blur(14px);
      }

      .orbit-node::before {
        position: absolute;
        left: -12px;
        top: 50%;
        width: 8px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--node-color, #66b8d4);
        box-shadow: 0 0 18px var(--node-color, #66b8d4);
        content: "";
        transform: translateY(-50%);
      }

      .orbit-node::after {
        position: absolute;
        left: -68px;
        top: 50%;
        width: 56px;
        height: 1px;
        background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--node-color, #66b8d4) 72%, transparent));
        content: "";
      }

      .orbit-node b {
        display: block;
        overflow: hidden;
        margin-bottom: 5px;
        font-size: 0.84rem;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .orbit-node span {
        display: block;
        color: rgba(248, 255, 250, 0.62);
        font-size: 0.7rem;
        font-weight: 760;
        line-height: 1.35;
      }

      .orbit-node.is-selected {
        background:
          linear-gradient(90deg, color-mix(in srgb, var(--node-color, #66b8d4) 34%, transparent), rgba(16, 48, 50, 0.76)),
          rgba(7, 22, 24, 0.82);
        outline: 2px solid color-mix(in srgb, var(--node-color, #66b8d4) 62%, white 8%);
      }

      .outdoor-card {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 12px;
        align-items: center;
        padding: 13px;
        border: 1px solid rgba(112, 189, 138, 0.28);
        border-radius: 8px;
        background: rgba(112, 189, 138, 0.14);
      }

      .outdoor-card b {
        font-size: 1.05rem;
      }

      .outdoor-card p {
        margin: 2px 0 0;
        color: rgba(248, 255, 250, 0.68);
        font-size: 0.88rem;
        line-height: 1.5;
        word-break: keep-all;
      }

      .outdoor-score {
        display: grid;
        place-items: center;
        width: 54px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #70bd8a;
        color: white;
        font-weight: 900;
        box-shadow: 0 10px 24px rgba(112, 189, 138, 0.24);
      }

      .search-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .search-row input {
        min-width: 0;
        height: 44px;
        padding: 0 13px;
        border: 1px solid rgba(102, 184, 212, 0.24);
        border-radius: 8px;
        outline: 0;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(248, 255, 250, 0.92);
      }

      .search-row input::placeholder {
        color: rgba(248, 255, 250, 0.48);
      }

      .icon-button,
      .chip {
        min-height: 40px;
        border: 1px solid rgba(102, 184, 212, 0.24);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(248, 255, 250, 0.78);
        cursor: pointer;
      }

      .icon-button {
        width: 44px;
        display: grid;
        place-items: center;
      }

      .icon-button svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      .data-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .data-tab {
        min-height: 48px;
        padding: 0 10px;
        border: 1px solid rgba(102, 184, 212, 0.24);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(248, 255, 250, 0.68);
        cursor: pointer;
      }

      .data-tab[aria-pressed="true"] {
        border-color: rgba(112, 189, 138, 0.54);
        background: rgba(112, 189, 138, 0.2);
        color: rgba(248, 255, 250, 0.94);
        font-weight: 820;
      }

      .chip {
        padding: 0 12px;
        color: rgba(248, 255, 250, 0.74);
      }

      .chip[aria-pressed="true"] {
        border-color: color-mix(in srgb, var(--chip, var(--yellow)) 70%, white 8%);
        background: color-mix(in srgb, var(--chip, var(--yellow)) 32%, transparent);
        color: rgba(248, 255, 250, 0.94);
        box-shadow: 0 10px 28px color-mix(in srgb, var(--chip, var(--yellow)) 18%, transparent);
      }

      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: rgba(248, 255, 250, 0.58);
        font-size: 0.86rem;
      }

      .results {
        overflow: hidden;
      }

      .result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 15px 16px;
        border-bottom: 1px solid rgba(102, 184, 212, 0.18);
      }

      .result-head strong {
        font-size: 1.06rem;
      }

      .result-list {
        display: grid;
        max-height: 48svh;
        overflow: auto;
      }

      .event-card {
        display: grid;
        gap: 10px;
        padding: 16px;
        border: 0;
        border-bottom: 1px solid rgba(102, 184, 212, 0.16);
        background:
          linear-gradient(90deg, rgba(102, 184, 212, 0.07), transparent 42%),
          transparent;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }

      .event-card:hover,
      .event-card:focus-visible,
      .event-card.active {
        outline: 0;
        background: rgba(112, 189, 138, 0.14);
      }

      .event-card h2 {
        margin: 0;
        font-size: clamp(1rem, 1.6vw, 1.24rem);
        line-height: 1.35;
        letter-spacing: 0;
        word-break: keep-all;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 25px;
        padding: 0 8px;
        border: 1px solid rgba(102, 184, 212, 0.2);
        border-radius: 999px;
        color: rgba(248, 255, 250, 0.62);
        font-size: 0.78rem;
      }

      .event-meta {
        color: rgba(248, 255, 250, 0.62);
        font-size: 0.9rem;
        line-height: 1.55;
        word-break: keep-all;
      }

      .detail {
        display: grid;
        gap: 14px;
        padding: 17px;
      }

      .detail h2 {
        margin: 0;
        font-size: clamp(1.28rem, 2.2vw, 1.8rem);
        line-height: 1.28;
        letter-spacing: 0;
        word-break: keep-all;
      }

      .detail p {
        margin: 0;
        color: rgba(248, 255, 250, 0.68);
        line-height: 1.72;
        word-break: keep-all;
      }

      .detail-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .link-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 13px;
        border: 1px solid rgba(102, 184, 212, 0.24);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(248, 255, 250, 0.86);
        font-weight: 720;
      }

      .link-button.primary {
        border-color: transparent;
        background: rgba(248, 255, 250, 0.9);
        color: var(--ink);
      }

      .empty {
        padding: 32px 18px;
        color: var(--muted);
        line-height: 1.6;
        text-align: center;
      }

      @media (max-width: 980px) {
        body {
          background-attachment: scroll;
        }

        .topbar,
        .hero,
        .stage-copy {
          grid-template-columns: 1fr;
        }

        .topbar,
        .stage-copy {
          align-items: start;
        }

        .status {
          white-space: normal;
        }

        .hero {
          display: grid;
        }

        .pulse-stage {
          min-height: 520px;
        }

        .stage-copy {
          display: grid;
        }

        .art-note {
          display: grid;
        }

        .legend {
          justify-content: flex-start;
        }

        .live-count {
          justify-items: start;
        }

        .map-insight {
          top: 190px;
        }
      }

      @media (max-width: 560px) {
        .app {
          padding: 14px;
        }

        .topbar {
          margin-bottom: 18px;
        }

        .brand strong {
          font-size: 1.16rem;
        }

        .brand span {
          font-size: 0.84rem;
        }

        .top-status {
          justify-content: flex-start;
          width: 100%;
        }

        .clock,
        .status {
          min-height: 34px;
          padding: 0 10px;
          font-size: 0.78rem;
        }

        .pulse-stage {
          min-height: 610px;
          overflow: visible;
        }

        .districts {
          inset: 22% -12% 6%;
        }

        .map-art {
          inset: 184px -15% 74px;
        }

        .district {
          width: 56px;
          font-size: 0.6rem;
        }

        .stage-copy {
          left: 18px;
          right: 18px;
          top: 18px;
          gap: 12px;
        }

        h1 {
          max-width: 9em;
          font-size: 2rem;
          line-height: 1;
        }

        .live-count {
          display: flex;
          align-items: end;
          gap: 8px;
        }

        .live-count b {
          font-size: 2.8rem;
          line-height: 0.9;
        }

        .live-count span {
          padding-bottom: 4px;
          font-size: 0.78rem;
        }

        .map-insight {
          top: 142px;
          gap: 6px;
        }

        .map-insight span {
          min-height: 28px;
          padding: 0 8px;
          font-size: 0.72rem;
        }

        .art-note {
          left: 18px;
          right: 18px;
          bottom: 16px;
          gap: 10px;
          font-size: 0.72rem;
          line-height: 1.5;
        }

        .legend {
          gap: 6px;
        }

        .legend span {
          min-height: 24px;
          padding: 0 7px;
        }

        .search-row {
          grid-template-columns: 1fr;
        }

        .icon-button {
          width: 100%;
        }

        .data-tabs {
          grid-template-columns: 1fr;
        }

        .data-orbit {
          position: absolute;
          left: 16px;
          right: 16px;
          top: 176px;
          bottom: auto;
          display: grid;
          grid-template-columns: 1fr;
          gap: 8px;
          padding: 0;
        }

        .orbit-node {
          position: relative;
          left: auto;
          top: auto;
          width: 100%;
          min-height: 58px;
          transform: none;
        }

        .orbit-node:nth-child(n + 5) {
          display: none;
        }

        .orbit-node::after {
          display: none;
        }
      }
    </style>

      function stripHtml(value = "") {
        const div = document.createElement("div");
        div.innerHTML = String(value).replaceAll("<br>", "\n");

      }

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function parseDate(value) {
        if (!value) return null;
        const [year, month, day] = String(value).split("-").map(Number);
        if (!year || !month || !day) return null;
        return new Date(year, month - 1, day);
      }

      function normalizeEvent(item) {
        const content = stripHtml(item.content);
        const type = item.event_gubun || "행사";
        const start = parseDate(item.start_date);
        const end = parseDate(item.end_date) || start;
        const text = `${item.subject} ${item.place} ${item.event_area} ${type} ${item.pay} ${item.pay_gubun} ${content}`.toLowerCase();
        const timeMatch = content.match(/(\d{1,2})[:시](?:\s?(\d{2})분?)?/);
        const payText = `${item.pay_gubun || ""} ${item.pay || ""}`.trim();
        const isFree = /무료|free/i.test(payText) || /(?:^|\s)0\s*원(?:\s|$)/.test(payText);
        return {
          id: item.event_seq || `${item.subject}-${item.start_date}`,

      function isInRange(event, date) {
        if (!event.start || !event.end) return false;
        const target = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        return event.start <= target && target <= event.end;

        const base = today();
        const day = base.getDay();
        const daysUntilSaturday = (6 - day + 7) % 7;
        const saturday = new Date(base);
        saturday.setDate(base.getDate() + daysUntilSaturday);
        const sunday = new Date(saturday);
        sunday.setDate(saturday.getDate() + 1);
        return [saturday, sunday];
      }

      function overlapsWeekend(event) {
        const [sat, sun] = weekendRange();
        return event.start && event.end && event.start <= sun && event.end >= sat;
      }

      function isOpenNow(event) {
        const now = new Date();
        if (!isInRange(event, now)) return false;
        if (event.hour === null) return true;
        const eventMinutes = event.hour * 60 + event.minute;
        const nowMinutes = now.getHours() * 60 + now.getMinutes();
        return nowMinutes >= eventMinutes && nowMinutes <= eventMinutes + 180;

      function distanceKm([lat1, lon1], [lat2, lon2]) {
        const radius = 6371;
        const toRad = (value) => (value * Math.PI) / 180;
        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
        return radius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

            if (filters.has("near") && state.nearestDistrict && item.area !== "대구" && item.area !== state.nearestDistrict) return false;
            return true;
          });

          if (!next.some((item) => item.id === state.selectedId)) state.selectedId = next[0]?.id || null;
          render();

        }

        const timeFilters = [

          filters.has("weekend") && overlapsWeekend,

        ].filter(Boolean);
        const typeFilters = [

        state.filtered = next;
        if (!next.some((event) => event.id === state.selectedId)) {
          state.selectedId = next[0]?.id || null;
        }
        render();
      }

      function renderChips() {
        els.chips.innerHTML = "";
        modeFilters[state.mode].forEach((filter) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "chip";
          button.textContent = filter.label;
          button.style.setProperty("--chip", filter.color);
          button.setAttribute("aria-pressed", state.activeFilters.has(filter.id));
          button.addEventListener("click", () => {
            if (filter.id === "near" && !state.nearestDistrict) {
              requestLocation();
              return;
            }
            if (state.activeFilters.has(filter.id)) state.activeFilters.delete(filter.id);
            else state.activeFilters.add(filter.id);
            applyFilters();
          });
          els.chips.append(button);
        });
      }

      function renderDataTabs() {
        els.dataTabs.innerHTML = "";
        viewConfig.forEach((view) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "data-tab";
          button.textContent = view.label;
          button.setAttribute("aria-pressed", state.mode === view.id);
          button.addEventListener("click", () => {
            state.mode = view.id;
            state.activeFilters = new Set(view.id === "culture" ? ["today"] : []);
            state.selectedId = null;
            applyFilters();
          });
          els.dataTabs.append(button);
        });
      }

      function renderOutdoorSignal() {
        const score = outdoorSignal.grade === "좋음" ? "OK" : outdoorSignal.grade === "보통" ? "MID" : "주의";
        els.outdoorCard.innerHTML = `
          <div class="outdoor-score">${score}</div>
          <div>
            <b>야외활동 ${escapeHtml(outdoorSignal.grade)}</b>
            <p>기온 ${outdoorSignal.temp}도 · 미세먼지 ${outdoorSignal.pm10} · 초미세먼지 ${outdoorSignal.pm25}<br>${escapeHtml(outdoorSignal.message)}</p>
          </div>
        `;
      }

      function renderMapInsight() {
        const cultureCount = state.mode === "culture" ? state.filtered.length : state.events.filter((event) => isInRange(event, today())).length;
        const parkCount = PARK_ITEMS.length;
        const activeAreas = new Set(state.filtered.map((item) => item.area).filter((area) => area && area !== "대구")).size;
        els.mapInsight.innerHTML = `
          ${state.selectedArea ? `<span>${escapeHtml(state.selectedArea)}만 보기</span>` : ""}
          <span>오늘 문화 ${cultureCount}개</span>
          <span>아이랑 공원 ${parkCount}곳</span>
          <span>활성 구·군 ${activeAreas}곳</span>
          <span>야외활동 ${escapeHtml(outdoorSignal.grade)}</span>
        `;
      }

      function renderDistricts() {
        const counts = Object.fromEntries(Object.keys(districtPositions).map((name) => [name, 0]));
        state.filtered.forEach((item) => {
          counts[item.area] = (counts[item.area] || 0) + 1;
        });
        document.querySelectorAll(".map-district").forEach((path) => {
          const area = path.dataset.area;
          const count = counts[area] || 0;
          const selected = state.selectedArea === area;
          path.classList.toggle("is-selected", selected);
          path.classList.toggle("is-active", selected || count > 0);
          path.classList.toggle("is-dim", state.selectedArea ? !selected : count === 0);
          path.onclick = () => selectArea(area);
        });
        els.districts.innerHTML = "";
        els.svgNodes.innerHTML = "";
        const activeAreas = Object.entries(districtSvgPositions).filter(([name]) => (counts[name] || 0) > 0);
        const hub = { x: state.mode === "culture" ? 382 : 360, y: state.mode === "culture" ? 522 : 546 };
        activeAreas.forEach(([name, pos], index) => {
          const count = counts[name] || 0;
          const tone = areaColors[name] || "#70bd8a";
          const drift = (index % 2 === 0 ? -1 : 1) * (24 + index * 5);
          const bendY = (hub.y + pos.y) / 2 - 34 - index * 3;
          const d = `M ${hub.x} ${hub.y} C ${hub.x + drift} ${bendY}, ${pos.x - drift} ${bendY}, ${pos.x} ${pos.y}`;
          ["echo", ""].forEach((variant) => {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("class", `data-flow${variant ? ` ${variant}` : ""}`);
            path.setAttribute("d", d);
            path.style.setProperty("--flow-color", tone);
            path.style.setProperty("--flow-width", String(1.3 + Math.min(count, 4) * 0.42));
            path.style.animationDelay = `${index * -0.17}s`;
            els.svgNodes.append(path);
          });
        });
        Object.entries(districtSvgPositions).forEach(([name, pos]) => {
          const count = counts[name] || 0;
          const tone = areaColors[name] || "#70bd8a";
          const radius = 31;
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          const selected = state.selectedArea === name;
          g.setAttribute("class", `svg-node${count || selected ? " is-active" : ""}${selected ? " is-selected" : ""}`);
          g.setAttribute("transform", `translate(${pos.x} ${pos.y})`);
          g.setAttribute("role", "button");
          g.setAttribute("aria-label", `${name} 정보만 보기`);
          g.tabIndex = 0;
          g.style.setProperty("--tone", tone);
          g.innerHTML = `
            <circle class="node-pulse" r="${radius + 3}"></circle>
            <circle class="node-core" r="${radius}"></circle>
            <text class="node-name" y="-3">${name}</text>
            <text class="node-count" y="14">${count}개</text>
          `;
          g.addEventListener("click", () => selectArea(name));
          g.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              selectArea(name);
            }
          });
          els.svgNodes.append(g);
        });
      }

      function renderDataOrbit() {
        const slots = [
          { x: "18%", y: "35%" },
          { x: "82%", y: "31%" },
          { x: "17%", y: "58%" },
          { x: "84%", y: "57%" },
          { x: "27%", y: "76%" },
          { x: "72%", y: "75%" },
          { x: "50%", y: "86%" },
          { x: "50%", y: "24%" },
        ];
        const ranked = [...state.filtered]
          .sort((a, b) => {
            const selectedScore = (b.id === state.selectedId) - (a.id === state.selectedId);
            const areaScore = (b.area === state.selectedArea) - (a.area === state.selectedArea);
            return selectedScore || areaScore || String(a.title).localeCompare(String(b.title), "ko");
          })
          .slice(0, slots.length);
        els.dataOrbit.innerHTML = "";
        ranked.forEach((item, index) => {
          const slot = slots[index];
          const node = document.createElement("button");
          node.type = "button";
          node.className = `orbit-node${item.id === state.selectedId ? " is-selected" : ""}`;
          node.style.setProperty("--x", slot.x);
          node.style.setProperty("--y", slot.y);
          node.style.setProperty("--node-color", areaColors[item.area] || getTypeColor(item.type));
          node.innerHTML = `
            <b>${escapeHtml(item.title)}</b>
            <span>${escapeHtml(item.area)} · ${escapeHtml(item.type)} · ${escapeHtml(state.mode === "culture" ? formatPeriod(item) : item.bestFor || item.pay)}</span>
          `;
          node.addEventListener("click", () => {
            state.selectedId = item.id;
            render();
          });
          els.dataOrbit.append(node);
        });
      }

      function formatPeriod(event) {
        if (!event.startKey) return "일정 미정";
        if (event.startKey === event.endKey) return event.startKey;
        return `${event.startKey} - ${event.endKey}`;
      }

      function renderList() {
        els.list.innerHTML = "";
        if (!state.filtered.length) {
          els.list.innerHTML = '<div class="empty">선택한 조건에 맞는 정보가 없습니다. 필터를 줄이거나 새로고침해 주세요.</div>';
          return;
        }

        state.filtered.slice(0, 80).forEach((event) => {
          const card = document.createElement("button");
          card.type = "button";
          card.className = `event-card ${event.id === state.selectedId ? "active" : ""}`;
          card.innerHTML = `
            <div class="tags">
              <span class="tag">${escapeHtml(event.type)}</span>
              <span class="tag">${escapeHtml(event.area)}</span>
              ${event.isFree || event.pay === "무료" ? '<span class="tag">무료</span>' : ""}
              ${isKidFriendly(event) ? '<span class="tag">가족</span>' : ""}
              ${event.bestFor ? `<span class="tag">${escapeHtml(event.bestFor)}</span>` : ""}
            </div>
            <h2>${escapeHtml(event.title)}</h2>
            <div class="event-meta">${escapeHtml(state.mode === "culture" ? formatPeriod(event) : event.pay)}<br>${escapeHtml(event.place)}</div>
          `;
          card.addEventListener("click", () => {
            state.selectedId = event.id;
            render();
          });
          els.list.append(card);
        });
      }

      function renderDetail() {
        const event = state.filtered.find((item) => item.id === state.selectedId);
        if (!event) {
          els.detail.innerHTML = "<p>정보를 선택하면 상세 내용이 표시됩니다.</p>";
          return;
        }
        const maps = `https://map.kakao.com/link/search/${encodeURIComponent(event.place)}`;
        const calendar = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&dates=${event.startKey?.replaceAll("-", "") || ""}/${event.endKey?.replaceAll("-", "") || event.startKey?.replaceAll("-", "") || ""}&details=${encodeURIComponent(event.content)}&location=${encodeURIComponent(event.place)}`;
        els.detail.innerHTML = `
          <div class="tags">
            <span class="tag">${escapeHtml(event.type)}</span>
            <span class="tag">${escapeHtml(event.area)}</span>
            <span class="tag">${escapeHtml(event.pay)}</span>
          </div>
          <h2>${escapeHtml(event.title)}</h2>
          <p>${escapeHtml(state.mode === "culture" ? formatPeriod(event) : event.pay)} · ${escapeHtml(event.place)}</p>
          <p>${escapeHtml(event.content || "상세 설명은 공식 페이지에서 확인할 수 있습니다.")}</p>
          ${event.facilities ? `<p>${event.facilities.map(escapeHtml).join(" · ")}</p>` : ""}
          ${event.contact ? `<p>문의 ${escapeHtml(event.contact)}</p>` : ""}
          <div class="detail-actions">
            ${event.homepage ? `<a class="link-button primary" href="${escapeHtml(event.homepage)}" target="_blank" rel="noreferrer">상세 보기</a>` : ""}
            <a class="link-button" href="${maps}" target="_blank" rel="noreferrer">길찾기</a>
            ${state.mode === "culture" ? `<a class="link-button" href="${calendar}" target="_blank" rel="noreferrer">일정 담기</a>` : ""}
          </div>
        `;
      }

      function renderClock() {
        const now = new Date();
        const weekday = ["일", "월", "화", "수", "목", "금", "토"][now.getDay()];
        els.clock.textContent = `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())}(${weekday}) ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      }

      function renderMeta() {
        const [sat, sun] = weekendRange();
        els.dateLabel.textContent = `오늘 ${toDateKey(today())} · 주말 ${toDateKey(sat)}-${toDateKey(sun).slice(5)}`;
        els.countLabel.textContent = `${state.filtered.length}개`;
        els.liveCount.textContent = state.filtered.length;
        const view = viewConfig.find((item) => item.id === state.mode) || viewConfig[0];
        els.liveLabel.textContent = view.countLabel;
        els.resultTitle.textContent = view.resultTitle;
        document.querySelector("#source-label").textContent = view.source;
        const locationLabel = state.nearestDistrict ? ` · 가까운 곳 ${state.nearestDistrict}` : "";
        const source = state.loadState === "live" ? "실시간 API+공식 거점" : "임시 샘플+공식 거점";
        const updated = state.updatedAt
          ? ` · ${pad(state.updatedAt.getHours())}:${pad(state.updatedAt.getMinutes())} 갱신`
          : "";
        els.status.textContent = state.mode === "culture" ? `${source} 연결${locationLabel}${updated}` : `${view.label} 보기${locationLabel}${updated}`;
      }

      function render() {
        renderDataTabs();
        renderOutdoorSignal();
        renderMapInsight();
        renderChips();
        renderDistricts();
        renderDataOrbit();
        renderList();
        renderDetail();
        renderMeta();
        drawPulse();
      }

      async function loadEvents(refresh = false) {
        state.loadState = "loading";
        els.status.textContent = "문화 데이터를 불러오는 중";
        if (location.protocol === "file:") {
          state.raw = FALLBACK_EVENTS;
          state.loadState = "sample";
          state.updatedAt = new Date();
          state.events = [...state.raw, ...CULTURE_ANCHOR_EVENTS].map(normalizeEvent).filter((event) => event.start);
          applyFilters();
          return;
        }
        try {
          const response = await fetch(`${API_URL}${refresh ? "?refresh=1" : ""}`);
          if (!response.ok) throw new Error(`API ${response.status}`);
          const data = await response.json();
          state.raw = Array.isArray(data) ? data : [];
          state.loadState = "live";
          state.updatedAt = new Date();
        } catch (error) {
          console.warn(error);
          state.raw = FALLBACK_EVENTS;
          state.loadState = "sample";
          state.updatedAt = new Date();
        }
        state.events = [...state.raw, ...CULTURE_ANCHOR_EVENTS].map(normalizeEvent).filter((event) => event.start);
        applyFilters();
      }

      function requestLocation() {
        if (!navigator.geolocation) {
          state.nearestDistrict = "중구";
          state.activeFilters.add("near");
          applyFilters();
          return;
        }
        els.status.textContent = "현재 위치를 확인하는 중";
        navigator.geolocation.getCurrentPosition(
          (position) => {
            state.nearestDistrict = closestDistrict([position.coords.latitude, position.coords.longitude]) || "중구";
            state.activeFilters.add("near");
            applyFilters();
          },
          () => {
            state.nearestDistrict = "중구";
            state.activeFilters.add("near");
            applyFilters();
          },
          { enableHighAccuracy: false, timeout: 7000, maximumAge: 600000 },
        );
      }

      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        applyFilters();
      });
      els.refresh.addEventListener("click", () => loadEvents(true));

      const ctx = els.canvas.getContext("2d");
      const liteMotion =
        location.protocol === "file:" ||
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      document.documentElement.classList.toggle("lite-motion", liteMotion);
      let particles = [];
      let flows = [];
      let lastFrame = 0;

      function resizeCanvas() {
        if (liteMotion) return;
        const rect = els.canvas.getBoundingClientRect();
        const scale = Math.min(window.devicePixelRatio || 1, 1.4);
        els.canvas.width = Math.max(1, Math.floor(rect.width * scale));
        els.canvas.height = Math.max(1, Math.floor(rect.height * scale));
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
      }

      function svgToCanvasPoint(point) {
        const canvasRect = els.canvas.getBoundingClientRect();
        const mapRect = els.mapArt.getBoundingClientRect();
        return {
          x: mapRect.left - canvasRect.left + (point.x / 760) * mapRect.width,
          y: mapRect.top - canvasRect.top + (point.y / 820) * mapRect.height,
        };
      }

      function drawPulse() {
        if (liteMotion) {
          particles = [];
          flows = [];
          return;
        }
        const count = Math.max(18, Math.min(54, state.filtered.length * 2));
        particles = Array.from({ length: count }, (_, index) => {
          const event = state.filtered[index % Math.max(1, state.filtered.length)];
          const pos = svgToCanvasPoint(districtSvgPositions[event?.area] || { x: 380, y: 520 });
          const tone = areaColors[event?.area] || getTypeColor(event?.type || "행사");
          return {
            x: pos.x + (Math.random() - 0.5) * 58,
            y: pos.y + (Math.random() - 0.5) * 58,
            r: 2 + Math.random() * 6,
            phase: Math.random() * Math.PI * 2,
            color: tone,
            speed: 0.012 + Math.random() * 0.018,
          };
        });
        const hub = svgToCanvasPoint(state.mode === "culture" ? { x: 382, y: 522 } : { x: 360, y: 546 });
        flows = state.filtered.slice(0, 18).map((event, index) => {
          const pos = svgToCanvasPoint(districtSvgPositions[event.area] || { x: 380, y: 520 });
          const end = {
            x: pos.x + Math.sin(index * 1.7) * 18,
            y: pos.y + Math.cos(index * 1.3) * 16,
          };
          const bend = {
            x: (hub.x + end.x) / 2 + (index % 2 === 0 ? -1 : 1) * (32 + (index % 5) * 9),
            y: (hub.y + end.y) / 2 - 70 + Math.sin(index) * 34,
          };
          return {
            start: hub,
            control: bend,
            end,
            color: areaColors[event.area] || getTypeColor(event.type),
            width: 0.75 + Math.min(2.2, Math.max(0.8, state.filtered.length / 18)) + (index % 3) * 0.14,
            speed: 0.055 + (index % 7) * 0.006,
            phase: (index * 0.137) % 1,
            glow: 7 + (index % 3) * 3,
          };
        });
      }

      function pointOnCurve(flow, t) {
        const inv = 1 - t;
        return {
          x: inv * inv * flow.start.x + 2 * inv * t * flow.control.x + t * t * flow.end.x,
          y: inv * inv * flow.start.y + 2 * inv * t * flow.control.y + t * t * flow.end.y,
        };
      }

      function animate(timestamp = 0) {
        if (liteMotion) return;
        if (document.hidden) {
          requestAnimationFrame(animate);
          return;
        }
        if (timestamp - lastFrame < 33) {
          requestAnimationFrame(animate);
          return;
        }
        lastFrame = timestamp;
        const rect = els.canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
        const now = timestamp * 0.001;

        ctx.globalCompositeOperation = "screen";
        flows.forEach((flow, index) => {
          ctx.beginPath();
          ctx.strokeStyle = flow.color;
          ctx.globalAlpha = 0.08;
          ctx.lineWidth = flow.width * 3.4;
          ctx.shadowBlur = flow.glow;
          ctx.shadowColor = flow.color;
          ctx.moveTo(flow.start.x, flow.start.y);
          ctx.quadraticCurveTo(flow.control.x, flow.control.y + Math.sin(now * 0.9 + index) * 10, flow.end.x, flow.end.y);
          ctx.stroke();

          ctx.setLineDash([1, 13]);
          ctx.lineDashOffset = -now * 58 - index * 9;
          ctx.beginPath();
          ctx.strokeStyle = flow.color;
          ctx.globalAlpha = 0.3;
          ctx.lineWidth = flow.width * 1.1;
          ctx.moveTo(flow.start.x, flow.start.y);
          ctx.quadraticCurveTo(flow.control.x, flow.control.y + Math.sin(now * 0.9 + index) * 10, flow.end.x, flow.end.y);
          ctx.stroke();
          ctx.setLineDash([]);

          for (let i = 0; i < 2; i += 1) {
            const t = (flow.phase + now * flow.speed + i * 0.5) % 1;
            const head = pointOnCurve(flow, t);
            const halo = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 15 + flow.glow);
            halo.addColorStop(0, "rgba(255,255,255,0.92)");
            halo.addColorStop(0.24, flow.color);
            halo.addColorStop(1, "rgba(255,255,255,0)");
            ctx.beginPath();
            ctx.fillStyle = halo;
            ctx.globalAlpha = 0.22 + Math.sin(now * 2 + index + i) * 0.04;
            ctx.arc(head.x, head.y, 15 + flow.glow, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.fillStyle = "#fffdf4";
            ctx.globalAlpha = 0.72;
            ctx.arc(head.x, head.y, 1.8 + flow.width * 0.7, 0, Math.PI * 2);
            ctx.fill();
          }
        });

        particles.forEach((p) => {
          const pulse = 0.55 + Math.sin(now * 2.2 + p.phase) * 0.45;
          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.globalAlpha = 0.08 + pulse * 0.2;
          ctx.shadowBlur = 10;
          ctx.shadowColor = p.color;
          ctx.arc(p.x + Math.sin(now + p.phase) * 6, p.y + Math.cos(now * 0.8 + p.phase) * 6, p.r + pulse * 4.5, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = "source-over";
        requestAnimationFrame(animate);
      }

      window.addEventListener("resize", () => {
        resizeCanvas();
        drawPulse();
      });

      resizeCanvas();
      renderClock();
      animate();
      loadEvents();
      setInterval(renderClock, 1000);
      setInterval(() => loadEvents(true), 10 * 60 * 1000);
      setInterval(applyFilters, 60 * 1000);
    </script>
  </body>
</html>
